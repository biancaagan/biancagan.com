        <div id="date-time">
            <h2 id="date"></h2>
            <script>
                document.getElementById("date").innerHTML = new Date().toLocaleDateString();
            </script>

            <h2 id="current-time"></h2>
            <script>
                function updateClock() {
                    const now = new Date();
                    document.getElementById('current-time').innerHTML = now.toLocaleTimeString();
                }
                // Update the clock every 1000 milliseconds (1 second)
                setInterval(updateClock, 1000);
            </script>
        </div>
    </div>

    <div id="mainDiv">
        <div id='brokerDiv'></div>

        <div id="dataDiv">
            <span style="font-family: IBM-Plex-Mono-Bold;">Status: </span>
            <div id="statusDiv"></div>
        </div>
        <div id="dataDiv">
            <span style="font-family: IBM-Plex-Mono-Bold;">Tomato 1 (Top-Left): </span>

        </div>
        <div id="dataDiv">

        <hr style="width: 80%; margin: 40px auto;">

        <div id="manualDiv">
            <!-- Label -->
            <span style="font-family: IBM-Plex-Mono-Bold;">Manual watering: </span>
            <!-- Text input -->
            <input type="text" id="waterInput" placeholder="type # of seconds">
            <!-- Button -->
            <button type="button" id="waterButton" onclick="waterOverride()">Water</button>
        </div>
        <p id="note" style="font-family: IBM-Plex-Mono-Regular;">
            * the manual watering doesn't work yet. clicking the button does nothing. *
        </p>
        <p id="hiddenText"></p>
    </div>

    <script>
        function waterOverride() {
            document.getElementById("hiddenText").innerHTML = "Why did you click it?";
